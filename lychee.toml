# lychee.toml

# Maximum number of concurrent network requests
max_concurrency = 50

# Request timeout (in seconds)
timeout = 20

# Number of retries for transient errors
max_retries = 3

# Wait time between retries (in seconds)
retry_wait_time = 3

# Accept HTTP 429 (Too Many Requests) as success (we don't want to fail if heavily throttled)
accept = [200, 429]

# Use a standard browser User-Agent to prevent 403 Forbidden blocks from strict firewalls
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36"

# Exclude URLs from being checked
exclude = [
    # Local and dummy domains
    '(http://)?localhost(:[0-9]+)?/?',
    '(http://)?127\.0\.0\.1(:[0-9]+)?/?',
    'http(s)?://example\.com',
    'http(s)?://.*\.example\.com',
    'http(s)?://.*\.local',
    
    # Specific problem domains known to aggressively block scrapers
    'http(s)?://linkedin\.com',
    'http(s)?://twitter\.com',
]

# Do not check mailto links
exclude_mail = true

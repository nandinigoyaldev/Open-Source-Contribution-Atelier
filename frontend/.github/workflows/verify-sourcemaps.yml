name: Verify Source Maps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-sourcemaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Verify source maps exist for every .js chunk
        run: |
          cd frontend
          echo "Checking for source maps in dist/client/assets/..."
          missing_maps=0
          for jsfile in dist/client/assets/*.js; do
            if [ -f "$jsfile" ]; then
              mapfile="${jsfile}.map"
              if [ ! -f "$mapfile" ]; then
                echo "Error: Missing source map for $jsfile"
                missing_maps=$((missing_maps + 1))
              else
                echo "Found source map for $(basename "$jsfile")"
              fi
            fi
          done
          if [ $missing_maps -gt 0 ]; then
            echo "Verification failed: $missing_maps source map(s) missing."
            exit 1
          fi
          echo "Verification passed: All .js files have matching .map files."
        shell: bash

name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  visual-regression:
    name: "Visual Regression (Playwright)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # On main: regenerate baselines so the next PR has an up-to-date reference.
      - name: Update visual baselines (main only)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend
        run: npm run test:visual:update

      # On PRs: compare against committed baselines and fail on diff > 1%.
      - name: Run visual regression tests (PR only)
        if: github.event_name == 'pull_request'
        working-directory: frontend
        run: npm run test:visual

      - name: Upload visual diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            frontend/playwright-report/
            frontend/e2e/test-results/
          retention-days: 30

      - name: Post visual diff summary as PR comment
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🖼️ Visual Regression Failed',
                '',
                'One or more screenshots differ from the baseline by more than **1%**.',
                '',
                'Download the **visual-regression-report** artifact from this workflow run to inspect the pixel diffs.',
                '',
                'If the change is intentional, update the baselines locally:',
                '```bash',
                'cd frontend && npm run test:visual:update',
                '```',
                'Then commit the updated snapshots.',
              ].join('\n'),
            });

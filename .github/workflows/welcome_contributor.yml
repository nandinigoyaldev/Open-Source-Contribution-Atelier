name: Welcome Contributor Automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome-issue:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post welcome comment on new issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const octokit = github.getOctokit(process.env.GITHUB_TOKEN);
            const commentBody = `👋 Hi @${issue.user.login}! Thanks for opening this issue.\n\nWe appreciate your contribution. Please make sure to check our [Contribution Guide](https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md) and the [Code of Conduct](https://github.com/${owner}/${repo}/blob/main/CODE_OF_CONDUCT.md). If you have any questions, feel free to ask here!`;
            await octokit.rest.issues.createComment({owner, repo, issue_number: issue.number, body: commentBody});

  welcome-pull-request:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post welcome comment on new PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const octokit = github.getOctokit(process.env.GITHUB_TOKEN);
            const commentBody = `🎉 Thanks for the pull request, @${pr.user.login}!\n\nPlease ensure you have followed the [Contribution Guide](https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md) and that your code passes all CI checks. We’ll review it soon. Happy hacking!`;
            await octokit.rest.issues.createComment({owner, repo, issue_number: pr.number, body: commentBody});

name: Stale Issue Automation

on:
  schedule:
    - cron: '0 0 * * *'   # run daily at midnight UTC

permissions:
  issues: write
  contents: read

jobs:
  stale-assignee-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find stale assignees and comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const threeDays = 3 * 24 * 60 * 60 * 1000;

            const issues = await octokit.paginate(github.rest.issues.listForRepo, {owner, repo, state: 'open', per_page: 100});

            for (const issue of issues) {
              if (issue.assignees.length === 0) continue;
              if (issue.labels.some(l => l.name === 'awaiting-response')) continue;

              const events = await octokit.paginate(github.rest.issues.listEvents, {owner, repo, issue_number: issue.number, per_page: 100});
              const assignEvent = events.filter(e => e.event === 'assigned').sort((a,b) => new Date(b.created_at) - new Date(a.created_at))[0];
              if (!assignEvent) continue;
              const assignedAt = new Date(assignEvent.created_at);
              const now = new Date();
              if (now - assignedAt < threeDays) continue;

              // check for PRs referencing this issue
              const searchQuery = `repo:${owner}/${repo} is:pr ${issue.number}`;
              const prs = await octokit.request('GET /search/issues', {q: searchQuery, per_page: 5});
              if (prs.data.total_count > 0) continue;

              const commentBody = `⚠️ It has been **3 days** since this issue was assigned to @${issue.assignees[0].login} without an associated pull request. Please respond within **48 hours** (e.g., submit a PR or comment) or the assignee will be removed.`;
              await github.rest.issues.createComment({owner, repo, issue_number: issue.number, body: commentBody});
              await github.rest.issues.addLabels({owner, repo, issue_number: issue.number, labels: ['awaiting-response']});
            }

  unassign-if-no-response:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unassign stale issues after no response
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fortyEightHours = 48 * 60 * 60 * 1000;

            const issues = await octokit.paginate(github.rest.issues.listForRepo, {owner, repo, state: 'open', labels: 'awaiting-response', per_page: 100});

            for (const issue of issues) {
              const comments = await octokit.paginate(github.rest.issues.listComments, {owner, repo, issue_number: issue.number, per_page: 100});
              const botComment = comments.reverse().find(c => c.user.type === 'Bot' && c.body.includes('It has been **3 days**'));
              if (!botComment) continue;
              const commentTime = new Date(botComment.created_at);
              const now = new Date();
              if (now - commentTime < fortyEightHours) continue;

              const assigneeLogin = issue.assignees[0]?.login;
              if (!assigneeLogin) {
                await github.rest.issues.removeLabel({owner, repo, issue_number: issue.number, name: 'awaiting-response'});
                continue;
              }

              // 1. Check if the assignee has commented on the issue since the bot's comment
              const recentAssigneeComment = comments.find(c => c.user.login === assigneeLogin && new Date(c.created_at) > commentTime);
              if (recentAssigneeComment) {
                await github.rest.issues.removeLabel({owner, repo, issue_number: issue.number, name: 'awaiting-response'});
                continue;
              }

              // 2. Check if there are any PRs referencing this issue authored by the assignee
              const searchQuery = `repo:${owner}/${repo} is:pr ${issue.number}`;
              const prsRes = await octokit.request('GET /search/issues', {q: searchQuery, per_page: 10});
              const prs = prsRes.data.items || [];
              const hasAssigneePr = prs.some(pr => pr.user.login === assigneeLogin);
              if (hasAssigneePr) {
                await github.rest.issues.removeLabel({owner, repo, issue_number: issue.number, name: 'awaiting-response'});
                continue;
              }

              // 3. Check if the assignee has commented on any referencing PRs since the bot's comment
              let respondedOnPr = false;
              for (const pr of prs) {
                const prComments = await octokit.paginate(github.rest.issues.listComments, {owner, repo, issue_number: pr.number, per_page: 100});
                const recentPrComment = prComments.find(c => c.user.login === assigneeLogin && new Date(c.created_at) > commentTime);
                if (recentPrComment) {
                  respondedOnPr = true;
                  break;
                }
              }
              if (respondedOnPr) {
                await github.rest.issues.removeLabel({owner, repo, issue_number: issue.number, name: 'awaiting-response'});
                continue;
              }

              await github.rest.issues.removeAssignees({owner, repo, issue_number: issue.number, assignees: [assigneeLogin]});
              await github.rest.issues.createComment({owner, repo, issue_number: issue.number, body: `⏰ No response from @${assigneeLogin} within 48 hours. The assignee has been removed.`});
              await github.rest.issues.removeLabel({owner, repo, issue_number: issue.number, name: 'awaiting-response'});
            }

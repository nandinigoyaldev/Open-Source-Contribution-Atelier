name: Scheduled Link Audit

on:
  schedule:
    # Run at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual triggering

jobs:
  link-checker:
    name: Exhaustive Repository Link Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lychee Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          args: --config lychee.toml --verbose --no-progress "frontend/public/content/**/*.md"
          fail: false # Do not fail the workflow on the scheduled run

      - name: Create GitHub Issue for Broken Links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🚨 Scheduled Link Audit: Broken Links Detected in Curriculum"
          content-filepath: ./lychee/out.md
          labels: |
            bug
            documentation
            curriculum

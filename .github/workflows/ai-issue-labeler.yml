name: AI Issue Labeler

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Generate AI Label
        id: ai-label
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not set. Skipping AI labeler."
            echo "label=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          PROMPT="You are a senior open source maintainer. An issue has been opened. Based on the title and body, classify its difficulty. Reply with EXACTLY ONE word from this list: easy, medium, hard. Title: $ISSUE_TITLE Body: $ISSUE_BODY"
          
          # Escape prompt for JSON
          JSON_PROMPT=$(jq -n --arg p "$PROMPT" '{"model": "gpt-3.5-turbo", "messages": [{"role": "user", "content": $p}], "temperature": 0.0, "max_tokens": 10}')
          
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$JSON_PROMPT")
            
          LABEL=$(echo $RESPONSE | jq -r '.choices[0].message.content' | tr '[:upper:]' '[:lower:]' | tr -d '[:punct:]' | xargs)
          
          # Validate label
          if [[ "$LABEL" == "easy" || "$LABEL" == "medium" || "$LABEL" == "hard" ]]; then
            echo "label=$LABEL" >> $GITHUB_OUTPUT
          else
            echo "label=none" >> $GITHUB_OUTPUT
          fi
          
      - name: Add label
        if: steps.ai-label.outputs.label != 'none'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['${{ steps.ai-label.outputs.label }}']
            })

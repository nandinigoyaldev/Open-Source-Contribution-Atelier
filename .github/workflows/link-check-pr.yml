name: CI - Async Link Checker (PR)

on:
  pull_request:
    paths:
      - 'frontend/public/content/**/*.md'

jobs:
  link-checker:
    name: Validate Markdown Links (Modified Files Only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to fetch all history for git diff

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r scripts/link_checker/requirements.txt

      - name: Get changed Markdown files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: frontend/public/content/**/*.md

      - name: Run Custom Async Link Checker
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python scripts/link_checker/checker.py ${{ steps.changed-files.outputs.all_changed_files }}

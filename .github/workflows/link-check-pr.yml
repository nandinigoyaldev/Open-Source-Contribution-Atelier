name: CI - Link Checker (PR)

on:
  pull_request:
    paths:
      - 'frontend/public/content/**/*.md'

jobs:
  link-checker:
    name: Validate Markdown Links (Modified Files Only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to fetch all history for git diff

      - name: Get changed Markdown files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: frontend/public/content/**/*.md

      - name: Run Lychee on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          # Only pass the exact files that changed
          args: --config lychee.toml --verbose --no-progress ${{ steps.changed-files.outputs.all_changed_files }}
          fail: true
